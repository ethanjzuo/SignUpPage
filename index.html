<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel = "stylesheet" href = "styles.css">
    <title>SignUpPage</title>
</head>
    <body>
        <div class = "container">
            <div class="img-container">
                <img src="images/avocado-toast-14.jpg" alt="avocado toast">
            </div>  
            <div class = "form-container">
                <h1 class="form-title">Sign Up</h1>
                <form id = "signup-form">
                    <div class="input-container">
                        <div class="col1">
                            <input type = "text" id = "first-name" placeholder = "First Name" class= "input" required>
                            <input type = "text" id = "last-name" placeholder = "Last Name" class= "input" required>
                            <input type = "email" id = "email" placeholder = "Email" class= "input" required>
                        </div>
                        <div class="col2">
                            <input type = "text" id = "phone number" placeholder = "Phone Number" class= "input" required>
                            <input type = "password" id = "password" placeholder = "Password" class= "input" required>
                            <input type = "password" id = "confirm password" placeholder = "Confirm Password" class= "input" required>
                        </div>
                    </div>
                    <button type = "submit" class = "btn">Sign Up</button>
                    <p class="login-link">If you already have an account, <b>Login here</b></p>
                </form>
            </div>
        </div>
        <script src="script.js"></script>
    </body>
</html>
